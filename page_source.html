    const inputElement = document.getElementById('mobile');
  if(inputElement) {
    // Modify the input's value by prefixing it with "+212"
    inputElement.value = '+212' + inputElement.value;
    // Add an 'input' event listener to the input element

// Add an 'input' event listener to the input element
inputElement.addEventListener('input', function() {
  // Ensure the value starts with '+' and is followed by up to 14 digits
  let value = this.value;
  
  // Remove any character that is not a digit or the first '+' sign
  value = value.replace(/(^\+)|[^0-9]+/g, function(match, p1) {
      return p1 ? '+' : '';
  });

  // Check if the first character is not '+', prepend it
  if (!value.startsWith('+')) {
    value = '+' + value;
  }

  // Limit the total length to 16 characters (1 '+' and 15 digits)
  this.value = value.substring(0, 16);
});
  }
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Function to get URL parameters
    function getQueryParam(param) {
        var queryString = window.location.search;
        var urlParams = new URLSearchParams(queryString);
        return urlParams.get(param);
    }
    
    // Get the ui_locales parameter from the URL
    var uiLocales = getQueryParam('ui_locales');
    
    // Find the link by ID or query selector and update its href attribute
    var backToHomePageLink = document.querySelector('a[href="https://flightpass.royalairmaroc.com/"]');
    if (backToHomePageLink && uiLocales) {
        var newHref = backToHomePageLink.href + '?lg=' + uiLocales;
        backToHomePageLink.href = newHref;
    }
});
</script>
